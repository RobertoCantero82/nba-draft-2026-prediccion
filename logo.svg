<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RC — NBA Draft 2026 ML Predictor</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
      .ascii { font-family:'Share Tech Mono','Courier New',monospace; font-size:15px; fill:#f97316; text-anchor:start; }
      .ascii-row { animation:faderow 0.5s ease both; }
      .r1{animation-delay:0.1s} .r2{animation-delay:0.22s} .r3{animation-delay:0.34s}
      .r4{animation-delay:0.46s} .r5{animation-delay:0.58s} .r6{animation-delay:0.70s}
      @keyframes faderow { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      .glow { animation:pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.72} }
      .byline { font-family:'Share Tech Mono','Courier New',monospace; font-size:12px; fill:#c2560f; text-anchor:middle; animation:faderow 0.6s ease 1.0s both; }
      .cursor { fill:#f97316; animation:blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .scanline { fill:none; stroke:#f97316; stroke-width:1; opacity:0.09; animation:scan 2.8s linear infinite; }
      @keyframes scan { 0%{transform:translateY(0px)} 100%{transform:translateY(220px)} }
      .corner { stroke:#f9731655; stroke-width:1.5; fill:none; }
      .divider { stroke:#f9731630; stroke-width:1; animation:growline 0.8s ease 1.1s both; transform-origin:340px 162px; }
      @keyframes growline { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      .deco { opacity:0; animation:ballin 0.6s ease forwards; }
      .deco1 { animation-delay:1.7s; }
      .deco2 { animation-delay:2.0s; }
      @keyframes ballin { from{opacity:0} to{opacity:0.45} }
      .tagline { font-family:'Share Tech Mono','Courier New',monospace; font-size:10.5px; fill:#f97316; text-anchor:middle; animation:faderow 0.6s ease 1.9s both; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect x="0" y="0" width="680" height="220" rx="8" fill="#0d1117"/>
  <line class="scanline" x1="0" y1="-220" x2="680" y2="-220"/>

  <!-- Esquinas -->
  <polyline class="corner" points="24,14 14,14 14,24"/>
  <polyline class="corner" points="656,14 666,14 666,24"/>
  <polyline class="corner" points="24,206 14,206 14,196"/>
  <polyline class="corner" points="656,206 666,206 666,196"/>





  <!-- ASCII art RC -->
  <g class="glow">
    <!-- R -->
    <text class="ascii ascii-row r1" x="228" y="52">&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2557; </text>
    <text class="ascii ascii-row r2" x="228" y="70">&#x2588;&#x2588;&#x2554;&#x2550;&#x2550;&#x2588;&#x2588;&#x2557;</text>
    <text class="ascii ascii-row r3" x="228" y="88">&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2554;&#x255D; </text>
    <text class="ascii ascii-row r4" x="228" y="106">&#x2588;&#x2588;&#x2554;&#x2550;&#x2588;&#x2588;&#x2557; </text>
    <text class="ascii ascii-row r5" x="228" y="124">&#x2588;&#x2588;&#x2551; &#x2588;&#x2588;&#x2551;</text>
    <text class="ascii ascii-row r6" x="228" y="142">&#x255A;&#x2550;&#x255D; &#x255A;&#x2550;&#x255D;</text>
    <!-- C -->
    <text class="ascii ascii-row r1" x="348" y="52"> &#x2588;&#x2588;&#x2588;&#x2588;&#x2557;</text>
    <text class="ascii ascii-row r2" x="348" y="70">&#x2588;&#x2588;&#x2554;&#x2550;&#x2550;&#x2550;&#x255D;</text>
    <text class="ascii ascii-row r3" x="348" y="88">&#x2588;&#x2588;&#x2551;</text>
    <text class="ascii ascii-row r4" x="348" y="106">&#x2588;&#x2588;&#x2551;</text>
    <text class="ascii ascii-row r5" x="348" y="124">&#x255A;&#x2588;&#x2588;&#x2588;&#x2588;&#x2557;</text>
    <text class="ascii ascii-row r6" x="348" y="142"> &#x255A;&#x2550;&#x2550;&#x2550;&#x255D;</text>
  </g>

  <!-- Línea divisoria -->
  <line class="divider" x1="120" y1="158" x2="560" y2="158"/>

  <!-- Byline con nombre -->
  <text class="byline" x="340" y="174">&gt; by Roberto Cantero · The Bridge 2026</text>
  <rect class="cursor" x="519" y="164" width="8" height="11" rx="1"/>

  <!-- Tagline -->
  <text class="tagline" x="340" y="200">PREDICTOR DRAFT NBA PARA MEDIO DE COMUNICACIÓN</text>

</svg>
